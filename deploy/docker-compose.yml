services:
  fu-ball-live-table:
    build:
      context: /home/konstantin/code/Fu-ball-de-scraper/frontend
    container_name: fu-ball-live-table
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.fu-ball-live-table.rule=Host(`fu-ball.194.164.194.141.sslip.io`)"
      - "traefik.http.routers.fu-ball-live-table.entrypoints=websecure"
      - "traefik.http.routers.fu-ball-live-table.tls.certresolver=letsencrypt"
      - "traefik.http.services.fu-ball-live-table.loadbalancer.server.port=80"
    networks:
      - traefik

networks:
  traefik:
    external: true
